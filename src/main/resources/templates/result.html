<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAR Correlation Generator</title>
    <style>
        :root {
            --bg: #f4f4ee;
            --panel: #ffffff;
            --text: #1f2a2e;
            --accent: #1b6b7d;
            --danger: #a31232;
            --border: #d5ddd8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #d6e9ee, var(--bg) 55%);
            color: var(--text);
        }
        .container {
            max-width: 1380px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
        }
        .processed-layout {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }
        .main-pane .card:first-child {
            margin-top: 0;
        }
        .variables-sidebar {
            margin-top: 0;
            position: sticky;
            top: 12px;
        }
        .download-har {
            margin-bottom: 10px;
        }
        .download-jmx {
            margin-bottom: 10px;
        }
        .download-rules {
            margin-bottom: 10px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: #2f4a52;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .download-btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            box-shadow: 0 1px 2px rgba(18, 52, 60, 0.18);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(18, 52, 60, 0.2);
        }
        .variables-sidebar .card {
            margin-top: 0;
        }
        .variables-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 2px;
        }
        .variable-row {
            border: 1px solid #e2e7ea;
            border-radius: 8px;
            background: #f8fafb;
            padding: 6px 8px;
        }
        .variable-key {
            font-family: "Consolas", monospace;
            font-size: 0.82rem;
            font-weight: 700;
            color: #2f4a52;
            margin-bottom: 3px;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .variable-value {
            font-family: "Consolas", monospace;
            font-size: 0.8rem;
            line-height: 1.2;
            color: #22363d;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-height: 4.8em;
            overflow-y: auto;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 1.8rem;
        }
        form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        input[type=file] {
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 8px;
            background: #f7faf8;
        }
        button {
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: var(--danger);
            margin: 10px 0;
            font-weight: 600;
        }
        .card {
            margin-top: 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            background: #fdfefe;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            border-bottom: 1px solid var(--border);
            padding: 8px;
            vertical-align: top;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f6f8fa;
            border-radius: 8px;
            border: 1px solid #e7ebee;
            padding: 10px;
        }
        .request-item + .request-item {
            border-top: 1px dashed #b8c8cc;
            margin-top: 16px;
            padding-top: 16px;
        }
        .variables-table {
            table-layout: fixed;
        }
        .variables-table th,
        .variables-table td {
            padding: 5px 7px;
            font-size: 0.88rem;
        }
        .variables-table th:first-child,
        .variables-table td:first-child {
            width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
        }
        .variables-table .value-compact {
            margin: 0;
            padding: 5px 7px;
            border-radius: 6px;
            border: 1px solid #e7ebee;
            background: #f6f8fa;
            font-family: "Consolas", monospace;
            font-size: 0.84rem;
            line-height: 1.2;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-height: 5.6em;
            overflow-y: auto;
        }
        .request-wrap {
            position: relative;
            --var-bg: #0d452821;
            --var-border: #0d452844;
            --var-text: #0d4528;
        }
        .request-wrap + .request-wrap {
            margin-top: 2px;
        }
        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .transaction-group {
            border: 1px solid #d8e0e8;
            border-radius: 12px;
            background: #ffffff;
            overflow: hidden;
        }
        .transaction-group[open] {
            box-shadow: 0 5px 14px rgba(58, 74, 92, 0.05);
        }
        .transaction-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px 12px 16px;
            cursor: pointer;
            list-style: none;
            background: linear-gradient(90deg, #dceafa 0%, #d6ddd8 100%);
            border-bottom: 1px solid #d2dbe3;
        }
        .transaction-summary::-webkit-details-marker {
            display: none;
        }
        .transaction-summary::before {
            content: "";
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 10px solid #6f89a3;
            flex: 0 0 auto;
            transform: rotate(0deg);
            transition: transform 0.16s ease;
        }
        .transaction-group[open] .transaction-summary::before {
            transform: rotate(90deg);
        }
        .transaction-title {
            font-weight: 800;
            color: #44586d;
            flex: 1;
        }
        .transaction-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            font-size: 0.85rem;
            color: #6b7987;
        }
        .transaction-badge {
            border: 1px solid #d3dbe3;
            border-radius: 999px;
            padding: 3px 8px;
            background: rgba(250, 252, 253, 0.96);
            font-weight: 700;
            white-space: nowrap;
        }
        .transaction-content {
            padding: 10px;
            max-height: 72vh;
            overflow-y: auto;
            background: transparent;
        }
        .request-item {
            border-radius: 10px;
            padding: 10px;
        }
        .request-item > div + div {
            margin-top: 2px;
        }
        .request-name {
            font-weight: 700;
            margin-bottom: 8px;
        }
        .kind-plain {
            background: #e4e9edba;
            border: 1px solid #e4e9ed;
        }
        .request-item.kind-plain {
            padding: 6px 8px;
        }
        .kind-plain .request-name {
            margin-bottom: 4px;
            font-size: 0.94rem;
        }
        .kind-plain .url-line {
            margin-top: 2px;
            margin-bottom: 2px;
        }
        .kind-plain .url-label {
            min-width: 28px;
            font-size: 0.82rem;
        }
        .kind-plain .url-value {
            padding: 4px 6px;
            font-size: 0.82rem;
            min-height: 1.6em;
            max-height: 4.2em;
        }
        .kind-source {
            background: #14197a24;
            border: 1px solid #cce6d3;
        }
        .kind-modified {
            background: #14197a24;
            border: 1px solid #cce6d3;
        }
        .source-link {
            margin-top: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #2b4f59;
            border-left: 3px solid #8db8c4;
            padding-left: 8px;
        }
        .version-block {
            border: 1px solid #dfe6ea;
            border-radius: 8px;
            background: #fbfcfd;
            padding: 10px;
            margin-top: 10px;
        }
        .version-block + .version-block {
            margin-top: 12px;
        }
        .inline-versions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .version-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .version-label {
            font-weight: 700;
            color: #34545e;
            padding-left: 2px;
        }
        .block-title {
            margin-top: 8px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .url-line {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-top: 6px;
            margin-bottom: 6px;
            flex-wrap: nowrap;
        }
        .url-label {
            font-weight: 700;
            color: #2f4a52;
            min-width: 34px;
        }
        .url-value {
            background: #f6f8fa;
            border: 1px solid #e7ebee;
            border-radius: 8px;
            padding: 6px 8px;
            font-family: "Consolas", monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            overflow-x: hidden;
            overflow-y: auto;
            max-height: 9.5em;
            min-height: 2.2em;
            flex: 1;
            min-width: 0;
            max-width: 100%;
        }
        .line-pair {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-top: 6px;
            margin-bottom: 6px;
            flex-wrap: nowrap;
        }
        .half-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
            margin-bottom: 6px;
        }
        .half-col {
            min-width: 0;
        }
        .line-label {
            font-weight: 700;
            color: #2f4a52;
        }
        .line-value {
            background: #f6f8fa;
            border: 1px solid #e7ebee;
            border-radius: 8px;
            padding: 6px 8px;
            font-family: "Consolas", monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            overflow-x: hidden;
            overflow-y: auto;
            max-height: 9.5em;
            min-height: 2.2em;
            flex: 1;
            min-width: 0;
            max-width: 100%;
        }
        .header-row .line-value {
            padding: 5px 7px;
            font-size: 0.84rem;
            max-height: 7.2em;
        }
        .kv {
            display: grid;
            grid-template-columns: 170px 1fr;
            gap: 6px 10px;
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .kv-key {
            font-weight: 700;
            color: #375158;
        }
        .small {
            font-size: 0.86rem;
            color: #35515b;
        }
        .source-sub {
            margin-top: 0;
            margin-left: 28px;
            padding-left: 16px;
            max-width: calc(100% - 28px);
            min-width: 0;
            color: #6a4a1f;
            font-size: 0.9rem;
            position: relative;
        }
        .source-sub::before {
            content: "";
            position: absolute;
            left: 8px;
            top: -1px;
            width: 0;
            height: 14px;
            border-left: 2px solid #d49a55;
        }
        .source-sub::after {
            content: "";
            position: absolute;
            left: 8px;
            top: 12px;
            width: 9px;
            border-top: 2px solid #d49a55;
        }
        .source-sub-outside {
            margin-top: 3px;
            margin-bottom: 12px;
        }
        .var-tag {
            display: inline-block;
            background: var(--var-bg);
            border: 1px solid var(--var-border);
            border-radius: 8px;
            padding: 6px 10px;
            font-family: "Consolas", monospace;
            font-size: 0.86rem;
            color: var(--var-text);
        }
        .var-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            min-width: 0;
            max-width: 100%;
        }
        .var-chip {
            background: var(--var-bg);
            border: 1px solid var(--var-border);
            border-radius: 6px;
            padding: 1px 4px;
            font-weight: 700;
            color: var(--var-text);
        }
        .var-tag {
            max-width: 100%;
            min-width: 0;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        @media (max-width: 900px) {
            .processed-layout {
                grid-template-columns: 1fr;
            }
            .variables-sidebar {
                position: static;
            }
            .inline-versions {
                grid-template-columns: 1fr;
            }
            .half-row {
                grid-template-columns: 1fr;
            }
            .kind-modified {
                margin-left: 0;
            }
        }
        .filter-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 160px 90px auto;
            gap: 8px;
            align-items: center;
            margin: 10px 0 14px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #f7faf8;
        }
        .filter-input,
        .filter-select {
            width: 100%;
            border: 1px solid #d0dbd6;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            background: #ffffff;
            color: var(--text);
        }
        .filter-input:focus,
        .filter-select:focus {
            outline: 2px solid rgba(27, 107, 125, 0.28);
            outline-offset: 1px;
        }
        .filter-clear {
            border: 1px solid #155665;
            border-radius: 10px;
            background: #ffffff;
            color: #155665;
            padding: 10px 12px;
            font-weight: 700;
        }
        .filter-clear:hover {
            background: #eef6f8;
        }
        .filter-meta {
            justify-self: end;
            font-size: 0.9rem;
            color: #2f4a52;
            font-weight: 700;
            white-space: nowrap;
        }
        .is-hidden {
            display: none !important;
        }
        @media (max-width: 1100px) {
            .filter-bar {
                grid-template-columns: 1fr;
            }
            .filter-meta {
                justify-self: start;
            }
        }
        .match-hl {
            background: repeating-linear-gradient(
                    -45deg,
                    rgba(255, 227, 84, 0.55) 0px,
                    rgba(255, 227, 84, 0.55) 6px,
                    rgba(255, 227, 84, 0.15) 6px,
                    rgba(255, 227, 84, 0.15) 12px
            );
            border-radius: 4px;
            padding: 0 2px;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .var-match {
            background: repeating-linear-gradient(
                    -45deg,
                    rgba(255, 227, 84, 0.50) 0px,
                    rgba(255, 227, 84, 0.50) 6px,
                    rgba(255, 227, 84, 0.12) 6px,
                    rgba(255, 227, 84, 0.12) 12px
            ) !important;
            border-color: rgba(168, 126, 0, 0.55) !important;
            color: #3b2b00 !important;
        }

</style>
</head>
<body>
<div class="container">
    <a class="back-link" href="/">&larr; Back</a>
    <h1>HAR Analyzer - Dynamic Correlation</h1>

        <div class="processed-layout">
            <div class="variables-sidebar">
                <div class="download-har">
                    <a href="/download/har">
                        <button class="download-btn" type="button">Download Modified HAR</button>
                    </a>
                </div>
                <div class="download-jmx">
                    <a href="/download/jmx">
                        <button class="download-btn" type="button">Convert to JMeter JMX</button>
                    </a>
                </div>
                <div class="download-rules">
                    <a href="/download/rules">
                        <button class="download-btn" type="button">Export Correlation Rules</button>
                    </a>
                </div>
                <div class="card">
                    <h2>Extracted Variables</h2>
                    <div class="variables-stack">
                        <div class="variable-row" th:each="entry : ${result.variables}">
                            <div class="variable-key" th:text="${entry.key}"></div>
                            <div class="variable-value" th:text="${entry.value}"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-pane">
                <div class="card">
                <h2>Request Scenario</h2>
                                <div class="filter-bar" id="filterBar">
                    <input id="filterVar" class="filter-input" type="text" placeholder="Filter by variable (e.g. codeh)" autocomplete="off">
                    <input id="filterDomain" class="filter-input" type="text" placeholder="Filter by domain (e.g. example.com)" autocomplete="off">
                    <select id="filterKind" class="filter-select">
                        <option value="">All request types</option>
                        <option value="MODIFIED">Modified</option>
                        <option value="UNTOUCHED">Untouched</option>
                    </select>
                    <button id="filterClear" class="filter-clear" type="button">Clear</button>
                    <div class="filter-meta" id="filterMeta"></div>
                </div>
<div id="transactionsList" class="transactions-list">
<div class="request-wrap"
                     th:each="req : ${result.rewrittenRequests}"
                     th:classappend="${req.kind == 'SOURCE'} ? ' source-group' : ''"
                     th:attr="data-kind=${req.kind},data-index=${req.index},data-source-index=${req.sourceIndex},data-started-at=${req.startedDateTime},data-request-name=${req.name}">
                    <div class="request-item"
                         th:classappend="${req.kind == 'SOURCE'} ? ' kind-source' : (${req.kind == 'MODIFIED'} ? ' kind-modified' : ' kind-plain')">
                        <div class="request-name" th:text="${'[T' + (req.index < 10 ? '0' + req.index : req.index) + ']: ' + req.method + ' - ' + req.name}"></div>

                    <div th:if="${req.kind == 'PLAIN'}">
                        <div class="url-line">
                            <div class="url-label">URL</div>
                            <div class="url-value" th:text="${req.originalUrl}"></div>
                        </div>
                    </div>

                    <div th:if="${req.kind == 'SOURCE'}">
                        <div class="half-row" th:if="${req.sourceResponseBody != null and !req.sourceResponseBody.trim().isEmpty()}">
                            <div class="half-col">
                                <div class="url-line">
                                    <div class="url-label">URL</div>
                                    <div class="url-value" th:text="${req.originalUrl}"></div>
                                </div>
                            </div>
                            <div class="half-col">
                                <div class="line-pair">
                                    <div class="line-label">Body</div>
                                    <div class="line-value" th:text="${req.sourceResponseBody}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="url-line" th:if="${req.sourceResponseBody == null or req.sourceResponseBody.trim().isEmpty()}">
                            <div class="url-label">URL</div>
                            <div class="url-value" th:text="${req.originalUrl}"></div>
                        </div>
                        <div th:if="${req.sourceExtractionType == 'HEADER'}" class="line-pair header-row">
                            <div class="line-label">Header</div>
                            <div class="line-value"
                                 th:text="${req.sourceHeaderName != null and !req.sourceHeaderName.trim().isEmpty()} ? (${req.sourceHeaderName} + ': ' + ${req.sourceHeaderValue}) : ${req.sourceHeaderValue}"></div>
                        </div>
                    </div>

                    <div th:if="${req.kind == 'MODIFIED'}">
                        <div class="source-link" th:if="${req.sourceIndex != null}">
                            <div class="small">
                                <span>Variables extracted from: </span>
                                <strong th:text="${'[T' + (req.sourceIndex < 10 ? '0' + req.sourceIndex : req.sourceIndex) + ']: ' + req.sourceMethod + ' - ' + req.sourceName}"></strong>
                            </div>
                        </div>

                        <div class="inline-versions">
                            <div class="version-col">
                                <div class="version-label">Before</div>
                                <div class="version-block">
                                <div class="url-line">
                                    <div class="url-label">URL</div>
                                    <div class="url-value" th:text="${req.originalUrl}"></div>
                                </div>

                                <div th:if="${req.originalHeaders != null and !#maps.isEmpty(req.originalHeaders)}" class="line-pair header-row">
                                    <div class="line-label">Header</div>
                                    <div class="line-value" th:text="${req.originalHeaders}"></div>
                                </div>

                                <div th:if="${req.originalBody != null and !req.originalBody.trim().isEmpty()}" class="line-pair">
                                    <div class="line-label">Body</div>
                                    <div class="line-value" th:text="${req.originalBody}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="version-col">
                                <div class="version-label">After</div>
                                <div class="version-block">
                                <div class="url-line">
                                    <div class="url-label">URL</div>
                                    <div class="url-value" th:text="${req.rewrittenUrl}"></div>
                                </div>

                                <div th:if="${req.rewrittenHeaders != null and !#maps.isEmpty(req.rewrittenHeaders)}" class="line-pair header-row">
                                    <div class="line-label">Header</div>
                                    <div class="line-value" th:text="${req.rewrittenHeaders}"></div>
                                </div>

                                <div th:if="${req.rewrittenBody != null and !req.rewrittenBody.trim().isEmpty()}" class="line-pair">
                                    <div class="line-label">Body</div>
                                    <div class="line-value" th:text="${req.rewrittenBody}"></div>
                                </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    </div>

                    <div class="source-sub source-sub-outside"
                         th:if="${req.sourceVariables != null and !#maps.isEmpty(req.sourceVariables)}">
                        <div class="var-list">
                            <span class="var-tag"
                                  th:each="entry : ${req.sourceVariables}"
                                  th:attr="data-var-name=${entry.key}"
                                  th:text="${entry.key} + ' = ' + ${entry.value}"></span>
                        </div>
                    </div>
                </div>
</div>
            </div>
        </div>
</div>
<script>
    (function () {
        function parseTimestamp(raw) {
            var text = (raw || '').toString().trim();
            if (!text) {
                return NaN;
            }
            var value = Date.parse(text);
            return Number.isFinite(value) ? value : NaN;
        }

        function pad2(value) {
            return String(value).padStart(2, '0');
        }

        function normalizeTransactionLabel(raw) {
            var text = (raw || '').toString().trim();
            if (!text || text === '/') {
                return 'Home';
            }

            text = text.replace(/[_\s]+/g, '-');
            text = text.replace(/[^A-Za-z0-9-]+/g, '-');
            text = text.replace(/-+/g, '-');
            text = text.replace(/^-|-$/g, '');
            if (!text) {
                return 'Home';
            }

            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function transactionTitleFor(wrap, fallbackIndex) {
            var reqName = (wrap.getAttribute('data-request-name') || '').trim();
            var label = normalizeTransactionLabel(reqName);
            return 'SC01_' + pad2(fallbackIndex) + '-' + label;
        }

        function createTransactionGroup(wraps, groupIndex) {
            var details = document.createElement('details');
            details.className = 'transaction-group';

            var summary = document.createElement('summary');
            summary.className = 'transaction-summary';

            var title = document.createElement('div');
            title.className = 'transaction-title';
            title.textContent = transactionTitleFor(wraps[0], groupIndex);

            var meta = document.createElement('div');
            meta.className = 'transaction-meta';

            var count = document.createElement('span');
            count.className = 'transaction-badge';
            count.textContent = wraps.length + ' calls';
            meta.appendChild(count);

            summary.appendChild(title);
            summary.appendChild(meta);
            details.appendChild(summary);

            var content = document.createElement('div');
            content.className = 'transaction-content';
            wraps.forEach(function (wrap) {
                content.appendChild(wrap);
            });
            details.appendChild(content);
            return details;
        }

        function groupRequestsByTransaction() {
            var list = document.getElementById('transactionsList');
            if (!list) {
                return;
            }

            var wraps = Array.prototype.slice.call(list.querySelectorAll(':scope > .request-wrap'));
            if (!wraps.length) {
                return;
            }

            var groups = [];
            var currentGroup = [];
            var previousTs = NaN;

            wraps.forEach(function (wrap) {
                var ts = parseTimestamp(wrap.getAttribute('data-started-at'));
                var shouldStartNew = !currentGroup.length;
                if (!shouldStartNew) {
                    if (!Number.isFinite(ts) || !Number.isFinite(previousTs)) {
                        shouldStartNew = true;
                    } else {
                        shouldStartNew = (ts - previousTs) >= 1000;
                    }
                }

                if (shouldStartNew) {
                    if (currentGroup.length) {
                        groups.push(currentGroup);
                    }
                    currentGroup = [wrap];
                } else {
                    currentGroup.push(wrap);
                }
                previousTs = ts;
            });

            if (currentGroup.length) {
                groups.push(currentGroup);
            }

            list.innerHTML = '';
            groups.forEach(function (group, index) {
                list.appendChild(createTransactionGroup(group, index + 1));
            });
        }

        function paletteForLot(lotId) {
            var n = Number(lotId);
            if (!Number.isFinite(n)) {
                n = 1;
            }
            // Palette constrained to requested color families.
            var tones = [
                { bg: "#0d452821", border: "#0d452833", text: "#0d4528" },
                { bg: "#0d45282b", border: "#0d452844", text: "#0d4528" },
                { bg: "#ad1c1c2b", border: "#ad1c1c44", text: "#7f1717" },
                { bg: "#ad1c1c33", border: "#ad1c1c55", text: "#7f1717" }
            ];
            return tones[Math.abs(n) % tones.length];
        }

        function applySourceColors() {
            var wraps = document.querySelectorAll('.request-wrap');
            wraps.forEach(function (wrap) {
                var kind = (wrap.getAttribute('data-kind') || '').trim();
                var index = (wrap.getAttribute('data-index') || '').trim();
                var sourceIndex = (wrap.getAttribute('data-source-index') || '').trim();

                var sourceId = '';
                if (kind === 'SOURCE' && index) {
                    sourceId = index;
                } else if (kind === 'MODIFIED' && sourceIndex) {
                    sourceId = sourceIndex;
                }

                if (!sourceId) {
                    return;
                }
                var color = paletteForLot(sourceId);
                wrap.style.setProperty('--var-bg', color.bg);
                wrap.style.setProperty('--var-border', color.border);
                wrap.style.setProperty('--var-text', color.text);
            });
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function highlightVars(text) {
            var escaped = escapeHtml(text);
            return escaped.replace(/\$\{[^}]+\}/g, function (m) {
                var name = m.slice(2, -1);
                return '<span class="var-chip" data-var-name="' + escapeHtml(name) + '">' + m + '</span>';
            });
        }

        function applyVariableLotColors() {
            var lotByVariable = new Map();

            // Variables listed under a SOURCE block define the extraction lot (its request index).
            var sourceWraps = document.querySelectorAll('.request-wrap[data-index]');
            sourceWraps.forEach(function (wrap) {
                var lotId = (wrap.getAttribute('data-index') || '').trim();
                if (!lotId) {
                    return;
                }
                var tags = wrap.querySelectorAll('.source-sub .var-tag[data-var-name]');
                if (!tags.length) {
                    return;
                }
                var lotColor = paletteForLot(lotId);
                tags.forEach(function (tag) {
                    var varName = (tag.getAttribute('data-var-name') || '').trim();
                    if (!varName) {
                        return;
                    }
                    lotByVariable.set(varName, lotColor);
                    tag.style.setProperty('--var-bg', lotColor.bg);
                    tag.style.setProperty('--var-border', lotColor.border);
                    tag.style.setProperty('--var-text', lotColor.text);
                });
            });

            // Ensure each ${variable} uses the color of its extraction lot.
            var chips = document.querySelectorAll('.var-chip[data-var-name]');
            chips.forEach(function (chip) {
                var varName = (chip.getAttribute('data-var-name') || '').trim();
                var lotColor = lotByVariable.get(varName);
                if (!lotColor) {
                    return;
                }
                chip.style.setProperty('--var-bg', lotColor.bg);
                chip.style.setProperty('--var-border', lotColor.border);
                chip.style.setProperty('--var-text', lotColor.text);
            });
        }

        var nodes = document.querySelectorAll('.kind-modified .url-value, .kind-modified .line-value');
        nodes.forEach(function (node) {
            var raw = node.textContent || '';
            node.innerHTML = highlightVars(raw);
        });

        groupRequestsByTransaction();
        applySourceColors();
        applyVariableLotColors();
    })();

    (function () {
        function normalize(text) {
            return (text || "").toString().trim().toLowerCase();
        }

        function stripVarTokens(text) {
            return (text || "").toString().replace(/\$\{[^}]+}/g, "");
        }

        function hostFromUrl(raw) {
            var text = stripVarTokens(raw || "").trim();
            if (!text) {
                return "";
            }
            try {
                var u = new URL(text);
                return (u.host || "").toLowerCase();
            } catch (e) {
                var m = text.match(/^https?:\/\/([^\/]+)/i);
                return m ? (m[1] || "").toLowerCase() : "";
            }
        }

        function collectWrapData(wrap) {
            var kind = (wrap.getAttribute('data-kind') || '').trim();
            var urlNodes = wrap.querySelectorAll('.url-value');
            var host = '';
            for (var i = 0; i < urlNodes.length; i++) {
                var h = hostFromUrl(urlNodes[i].textContent || '');
                if (h) {
                    host = h;
                    break;
                }
            }

            var vars = new Set();
            wrap.querySelectorAll('[data-var-name]').forEach(function (node) {
                var name = (node.getAttribute('data-var-name') || '').trim();
                if (name) {
                    vars.add(name.toLowerCase());
                }
            });

            return { kind: kind, host: host, vars: vars };
        }
        function applyHighlights(varQ, variableRows, varNodes) {
            var q = (varQ || "").toString().trim().toLowerCase();

            function setHighlightedText(el, rawText) {
                var original = rawText == null ? "" : rawText.toString();
                if (!q) {
                    el.textContent = original;
                    return;
                }

                var lower = original.toLowerCase();
                var idx = lower.indexOf(q);
                if (idx < 0) {
                    el.textContent = original;
                    return;
                }

                var frag = document.createDocumentFragment();
                var start = 0;
                while (idx >= 0) {
                    if (idx > start) {
                        frag.appendChild(document.createTextNode(original.slice(start, idx)));
                    }
                    var span = document.createElement('span');
                    span.className = 'match-hl';
                    span.textContent = original.slice(idx, idx + q.length);
                    frag.appendChild(span);
                    start = idx + q.length;
                    idx = lower.indexOf(q, start);
                }
                if (start < original.length) {
                    frag.appendChild(document.createTextNode(original.slice(start)));
                }

                el.textContent = '';
                el.appendChild(frag);
            }

            if (variableRows && variableRows.length) {
                variableRows.forEach(function (row) {
                    var key = row.querySelector('.variable-key');
                    if (!key) {
                        return;
                    }
                    if (!key.dataset.origText) {
                        key.dataset.origText = key.textContent || '';
                    }
                    setHighlightedText(key, key.dataset.origText);
                });
            }

            if (varNodes && varNodes.length) {
                varNodes.forEach(function (node) {
                    var name = (node.getAttribute('data-var-name') || '').toString().trim().toLowerCase();
                    if (q && name && name.indexOf(q) !== -1) {
                        node.classList.add('var-match');
                    } else {
                        node.classList.remove('var-match');
                    }
                });
            }
        }


        function applyFilters(state, wraps, wrapData, variableRows) {
            var varQ = normalize(state.varQuery);
            var domainQ = normalize(state.domainQuery);
            var kindQ = (state.kindQuery || '').trim();

            
            applyHighlights(varQ, variableRows, varNodes);
var total = wraps.length;
            var shown = 0;

            wraps.forEach(function (wrap) {
                var data = wrapData.get(wrap);
                var ok = true;
                if (kindQ) {
                    if (kindQ === 'MODIFIED') {
                        ok = (data.kind === 'MODIFIED' || data.kind === 'SOURCE');
                    } else if (kindQ === 'UNTOUCHED') {
                        ok = (data.kind === 'PLAIN');
                    } else {
                        ok = (data.kind === kindQ);
                    }
                }
                if (ok && domainQ) {
                    ok = data.host && data.host.indexOf(domainQ) !== -1;
                }
                if (ok && varQ) {
                    var has = false;
                    data.vars.forEach(function (v) {
                        if (!has && v.indexOf(varQ) !== -1) {
                            has = true;
                        }
                    });
                    ok = has;
                }

                if (ok) {
                    wrap.classList.remove('is-hidden');
                    shown++;
                } else {
                    wrap.classList.add('is-hidden');
                }
            });

            var groups = Array.prototype.slice.call(document.querySelectorAll('.transaction-group'));
            groups.forEach(function (group) {
                var visibleWraps = group.querySelectorAll('.request-wrap:not(.is-hidden)');
                if (visibleWraps.length) {
                    group.classList.remove('is-hidden');
                } else {
                    group.classList.add('is-hidden');
                }
            });

            if (variableRows && variableRows.length) {
                variableRows.forEach(function (row) {
                    var key = row.querySelector('.variable-key');
                    var name = normalize(key ? key.textContent : '');
                    if (!varQ || (name && name.indexOf(varQ) !== -1)) {
                        row.classList.remove('is-hidden');
                    } else {
                        row.classList.add('is-hidden');
                    }
                });
            }

            var meta = document.getElementById('filterMeta');
            if (meta) {
                meta.textContent = shown + ' / ' + total;
            }
        }

        var filterVar = document.getElementById('filterVar');
        var filterDomain = document.getElementById('filterDomain');
        var filterKind = document.getElementById('filterKind');
        var filterClear = document.getElementById('filterClear');

        if (!filterVar || !filterDomain || !filterKind || !filterClear) {
            return;
        }

        var wraps = Array.prototype.slice.call(document.querySelectorAll('.request-wrap'));
        var wrapData = new Map();
        wraps.forEach(function (wrap) {
            wrapData.set(wrap, collectWrapData(wrap));
        });

        var variableRows = Array.prototype.slice.call(document.querySelectorAll('.variables-stack .variable-row'));

        
        var varNodes = Array.prototype.slice.call(document.querySelectorAll('[data-var-name]'));
function readState() {
            return {
                varQuery: filterVar.value,
                domainQuery: filterDomain.value,
                kindQuery: filterKind.value
            };
        }

        function onChange() {
            applyFilters(readState(), wraps, wrapData, variableRows);
        }

        filterVar.addEventListener('input', onChange);
        filterDomain.addEventListener('input', onChange);
        filterKind.addEventListener('change', onChange);
        filterClear.addEventListener('click', function () {
            filterVar.value = '';
            filterDomain.value = '';
            filterKind.value = '';
            onChange();
            filterVar.focus();
        });

        onChange();
    })();

</script>
