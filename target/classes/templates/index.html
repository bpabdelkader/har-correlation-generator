<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAR Correlation Generator</title>
    <style>
        :root {
            --bg: #f4f4ee;
            --panel: #ffffff;
            --text: #1f2a2e;
            --accent: #1b6b7d;
            --danger: #a31232;
            --border: #d5ddd8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #d6e9ee, var(--bg) 55%);
            color: var(--text);
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 1.8rem;
        }
        form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 8px;
        }
        input[type=file] {
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 8px;
            background: #f7faf8;
        }
        button {
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: var(--danger);
            margin: 10px 0;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>HAR Correlation Generator</h1>

    <form method="post" enctype="multipart/form-data" action="/analyze">
        <input type="file" name="harFile" accept=".har,.json" required>
        <button type="submit">Analyze</button>
    </form>

    <div class="error" th:if="${error}" th:text="${error}"></div>
</div>
</body>
</html>
